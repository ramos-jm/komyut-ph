name: Neon Overpass Sync

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 02:00 UTC
    - cron: "0 2 * * 1"

concurrency:
  group: neon-overpass-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60      # grid import takes longer — allow up to 1 hour
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run grid-based Overpass sync
        env:
          DATABASE_URL:            ${{ secrets.DATABASE_URL }}
          DATABASE_SSL:            ${{ vars.DATABASE_SSL || 'require' }}
          IMPORT_DEFAULT_REGION:   ${{ vars.IMPORT_DEFAULT_REGION || 'metro-manila-calabarzon' }}
          IMPORT_DEFAULT_BBOX:     ${{ vars.IMPORT_DEFAULT_BBOX   || '13.80,120.55,14.83,122.10' }}
          IMPORT_DEFAULT_LIMIT:    ${{ vars.IMPORT_DEFAULT_LIMIT  || '500' }}
          # Grid splits the region into smaller cells so Overpass never times out
          IMPORT_GRID_LAT:         ${{ vars.IMPORT_GRID_LAT || '3' }}
          IMPORT_GRID_LNG:         ${{ vars.IMPORT_GRID_LNG || '4' }}
        run: node scripts/sync-data.js
